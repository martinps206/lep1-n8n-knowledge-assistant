services:

  postgres:

    image: postgres:16

    container_name: lep1-postgres

    restart: always

    environment:

      POSTGRES_DB: knowledge_db

      POSTGRES_USER: admin

      POSTGRES_PASSWORD: admin123

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  n8n:

    image: n8nio/n8n

    container_name: lep1-n8n

    restart: always

    ports:

      - "5678:5678"

    environment:

      - DB_TYPE=postgresdb

      - DB_POSTGRESDB_HOST=postgres

      - DB_POSTGRESDB_PORT=5432

      - DB_POSTGRESDB_DATABASE=knowledge_db

      - DB_POSTGRESDB_USER=admin

      - DB_POSTGRESDB_PASSWORD=admin123

    depends_on:

      - postgres

volumes:

  postgres_data: